name: Deploy OpenFinance API

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up venv and install requirements
        run: |
          python3 -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements.txt

      - name: Restart OpenFinance API
        run: |
          sudo systemctl restart openfinance

      - name: Health check
        run: |
          sleep 4
          curl -f http://localhost:8000 || exit 1