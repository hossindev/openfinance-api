name: Deploy OpenFinance API

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Link .env file
        run: |
          ln -sf /home/ryzzlab/openfinance/secrets/.env .env

      - name: Set up venv and install requirements
        run: |
          python3 -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements.txt

      - name: Restart OpenFinance API
        run: |
          sudo systemctl restart openfinance

      - name: Health check
        run: |
          sleep 15
          timeout 60 bash -c '
          until curl -f http://localhost:8000/health; do
            echo "API not ready yet..."
            sleep 2
          done'