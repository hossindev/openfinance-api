name: Deploy OpenFinance API
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Link .env file
        run: |
          ln -sf /home/ryzzlab/openfinance/secrets/.env .env

      - name: Set up venv and install requirements
        run: |
          test -d /home/ryzzlab/openfinance/venv || python3 -m venv /home/ryzzlab/openfinance/venv

          HASH_FILE="/home/ryzzlab/openfinance/.requirements_hash"
          CURRENT_HASH=$(md5sum requirements.txt | awk '{print $1}')

          if [ ! -f "$HASH_FILE" ] || [ "$(cat $HASH_FILE)" != "$CURRENT_HASH" ]; then
            echo "requirements.txt changed, installing..."
            /home/ryzzlab/openfinance/venv/bin/pip install --upgrade pip --quiet
            /home/ryzzlab/openfinance/venv/bin/pip install -r requirements.txt --quiet
            echo "$CURRENT_HASH" > "$HASH_FILE"
          else
            echo "requirements.txt unchanged, skipping install."
          fi

      - name: Run database migrations
        run: |
          source .env
          psql "postgresql://openfinance:${password}@localhost/openfinance_db" \
            -v ON_ERROR_STOP=1 \
            -f ./database/init.sql

      - name: Restart OpenFinance API
        run: |
          sudo systemctl restart openfinance

      - name: Health check
        run: |
          sleep 90
          timeout 60 bash -c '
          until curl -f http://localhost:8000/health; do
            echo "API not ready yet..."
            sleep 2
          done'