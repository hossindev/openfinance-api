name: Deploy OpenFinance API
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Link .env file
        run: |
          ln -sf /home/ryzzlab/openfinance/secrets/.env .env

      - name: Set up venv and install requirements
        run: |
          test -d .venv || python3 -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install --upgrade-strategy only-if-needed -r requirements.txt

      - name: Run database migrations
        run: |
          source .env
          psql "postgresql://openfinance:${password}@localhost/openfinance_db" \
            -v ON_ERROR_STOP=1 \
            -f ./database/init.sql

      - name: Restart OpenFinance API
        run: |
          sudo systemctl restart openfinance

      - name: Health check
        run: |
          sleep 90
          timeout 60 bash -c '
          until curl -f http://localhost:8000/health; do
            echo "API not ready yet..."
            sleep 2
          done'